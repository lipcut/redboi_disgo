            type="text/css"
        />

        <script>
            let wsRetryCount = 0;
            const wsMaxDelay = 30000;

            function dial() {
                const conn = new WebSocket(`/api/subscribe`);

                conn.addEventListener("close", (event) => {
                    if (event.code !== 1001) {
                        const delay = Math.min(
                            1000 * Math.pow(2, wsRetryCount),
                            wsMaxDelay,
                        );
                        const jitter = Math.random() * 500;
                        wsRetryCount++;
                        setTimeout(dial, delay + jitter);
                    }
                });
                conn.addEventListener("open", (event) => {
                    console.info("websocket connected");
                    wsRetryCount = 0;
                });

                // This is where we handle messages received.
                conn.addEventListener("message", async (event) => {
                    if (typeof event.data !== "string") {
                        console.error(
                            "unexpected message type",
                            typeof event.data,
                        );
                        return;
                    }

                    if (event.data === "update!")
                        document.getElementById("ds-sync-trigger").click();
                });
            }

            dial();
        </script>

                                        if (evt.keyCode === 40 && $searchResultCount > 0) {
                                            $searchIndex = ($searchIndex + 1) % $searchResultCount;
                                            $selectedIdentifier = document.querySelector('[data-search-index=&quot;' + $searchIndex + '&quot;]')?.dataset?.identifier || '';
                                        } else if (evt.keyCode === 38 && $searchResultCount > 0) {
                                            $searchIndex = ($searchIndex - 1 + $searchResultCount) % $searchResultCount;
                                            $selectedIdentifier = document.querySelector('[data-search-index=&quot;' + $searchIndex + '&quot;]')?.dataset?.identifier || '';
                                        } else if (evt.keyCode === 13 && $identifier !== '') {
                                            if ($searchIndex >= 0 && $searchResultCount > 0) {
                                                $identifier = $selectedIdentifier;
                                                @post('/api/enqueue');
                                            } else {
                                                @post('/api/enqueue');
                                            }
                                            $identifier = '';
                                            $searchIndex = -1;
                                            $selectedIdentifier = '';
                                        } else if (evt.keyCode === 27) {
                                            $identifier = '';
                                            $searchIndex = -1;
                                            $selectedIdentifier = '';
                                        }
                                    })()"
                                />
                            </div>

                            <ul
                                id="search-results"
                                data-attr:hidden="$identifier == ''"
                                class="dropdown-content list menu bg-base-200 rounded-box w-full"
                            ></ul>
                        </div>

                        <button
                            class="btn btn-primary join-item"
                            data-attr:disabled="$identifier == ''"
                            data-on:click="@post('/api/enqueue'); $identifier = ''"
                        >
                            Enqueue
                        </button>
                    </div>
                    <div class="flex gap-2 join place-content-center">
                        <button
                            class="btn btn-outline join-item"
                            data-on:click="@get('/api/toggle-play')"
                            id="play-pause-btn"
                        ></button>
                        <button
                            class="btn btn-outline join-item"
                            data-on:click="@get('/api/skip')"
                        >
                            Next
                        </button>
                        <button
                            class="btn btn-warning btn-outline join-item"
                            data-on:click="@get('/api/stop')"
                        >
                            Stop
                        </button>
                        <button
                            class="btn btn-error btn-outline join-item"
                            data-on:click="@post('/api/clear')"
                        >
                            Clear
                        </button>
                    </div>
                </div>
            </section>

            <!-- Queue -->
            <section class="card bg-base-100 shadow-sm">
                <div class="card-body">
                    <h3 class="card-title text-lg">Queue</h3>
                    <ul
                        class="list bg-base-100 rounded-box shadow-md"
                        id="queue"
                    ></ul>
                </div>
            </section>
        </main>
    </body>
</html>
