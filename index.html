            <!-- Now Playing -->
            <section class="card bg-base-100 shadow-sm">
                <div class="card-body">
                    <h2
                        class="text-lg card-title opacity-90"
                        id="nowPlayingSong"
                    ></h2>
                </div>
            </section>

            <!-- Controls -->
            <section class="card bg-base-100 shadow-sm">
                <div class="card-body space-y-4">
                    <div
                        class="join w-full"
                        data-on:keydown="evt.keyCode == 13 && (() => { @post('/api/enqueue'); $identifier = ''})() "
                    >
                        <input
                            type="text"
                            placeholder="YouTube URL or Search Query"
                            class="input input-bordered join-item w-full"
                            data-bind="identifier"
                        />
                        <button
                            class="btn btn-primary join-item"
                            data-attr:disabled="$identifier == ''"
                            data-on:click="@post('/api/enqueue'); $identifier = ''"
                        >
                            Enqueue
                        </button>
                    </div>

                    <div class="flex gap-2 join place-content-center">
                        <button
                            class="btn btn-outline join-item"
                            data-on:click="@post('/api/toggle-play')"
                            id="play-pause-btn"
                        ></button>
                        <button
                            class="btn btn-outline join-item"
                            data-on:click="@post('/api/skip')"
                        >
                            Next
                        </button>
                        <button
                            class="btn btn-warning btn-outline join-item"
                            data-on:click="@post('/api/stop')"
                        >
                            Stop
                        </button>
                        <button
                            class="btn btn-error btn-outline join-item"
                            data-on:click="@post('/api/clear')"
                        >
                            Clear
                        </button>
                    </div>
                </div>
            </section>

            <!-- Queue -->
            <section class="card bg-base-100 shadow-sm">
                <div class="card-body">

                    <ul
                        class="list bg-base-100 rounded-box shadow-md"
                        id="queue"
                    ></ul>
                </div>
            </section>
